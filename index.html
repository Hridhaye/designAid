<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cult Chart Editor</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Cinzel:wght@400;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:      #0e0c0a;
    --surface: #131110;
    --panel:   #181512;
    --border:  #2a2420;
    --border2: #4a4038;
    --accent:  #d4a84c;
    --accent2: #8c6c3e;
    --text:    #e8dfd0;
    --muted:   #a09080;
    --dim:     #7a6a5a;
    --hover:   rgba(212,168,76,0.07);
    --sel:     rgba(212,168,76,0.16);
    --mono:    'Courier Prime', monospace;
    --head:    'Cinzel', Georgia, serif;
    --panel-w: 360px;
}

html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--mono); font-size: 14px; overflow: hidden;
}

.shell { display: flex; flex-direction: column; height: 100vh; }

.header {
    flex-shrink: 0; display: flex; align-items: center;
    padding: 0 16px; height: 46px;
    border-bottom: 1px solid var(--border); background: var(--surface); gap: 12px;
    z-index: 10;
}

.header h1 {
    font-family: var(--head); font-size: 12px; font-weight: 600;
    letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; white-space: nowrap;
}

.header-sep { flex: 1; }

.header-hint { font-size: 11px; color: var(--dim); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.btn-toggle-panel {
    flex-shrink: 0; background: none; border: 1px solid var(--border2);
    color: var(--muted); font-family: var(--mono); font-size: 18px; line-height: 1;
    width: 32px; height: 28px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: color 0.15s, border-color 0.15s;
    border-radius: 2px;
}
.btn-toggle-panel:hover { color: var(--accent); border-color: var(--accent2); }

.body {
    flex: 1; display: flex; overflow: hidden;
}

.panel {
    flex-shrink: 0; width: var(--panel-w);
    background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width 0.22s ease, opacity 0.22s ease;
}

.panel.collapsed {
    width: 0 !important;
    opacity: 0;
    pointer-events: none;
    border-right: none;
}

.panel-head {
    flex-shrink: 0; padding: 9px 14px 7px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 7px;
}

.panel-head-title {
    font-family: var(--head); font-size: 9px; letter-spacing: 0.22em;
    color: var(--muted); text-transform: uppercase; flex: 1;
}

.panel-head-btn {
    background: none; border: 1px solid var(--border2); color: var(--text);
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
    padding: 3px 8px; cursor: pointer; white-space: nowrap;
    transition: color 0.1s, border-color 0.1s; touch-action: manipulation;
}
.panel-head-btn:hover { color: var(--accent); border-color: var(--accent2); }

.tree-scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 0 60px;
    -webkit-overflow-scrolling: touch;
}
.tree-scroll::-webkit-scrollbar { width: 3px; }
.tree-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.tree-row {
    display: flex; align-items: center;
    min-height: 34px;
    padding-right: 4px; cursor: pointer; position: relative;
}
.tree-row:hover { background: var(--hover); }
.tree-row.selected { background: var(--sel); }

.vline { flex-shrink: 0; width: 16px; height: 34px; position: relative; }
.vline.continues::before {
    content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
    width: 1px; background: var(--border2);
}

.connector { flex-shrink: 0; width: 16px; height: 34px; position: relative; }
.connector::before {
    content: ''; position: absolute; left: 8px; top: 0; height: 17px;
    width: 1px; background: var(--border2);
}
.connector::after {
    content: ''; position: absolute; left: 8px; top: 17px;
    width: 7px; height: 1px; background: var(--border2);
}
.connector.not-last::before { height: 34px; }

.toggle {
    flex-shrink: 0; width: 14px; height: 14px; border: 1px solid var(--border2);
    color: var(--text); font-size: 8px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; margin-right: 4px;
    transition: color 0.1s, border-color 0.1s; touch-action: manipulation;
}
.toggle:hover { border-color: var(--accent2); color: var(--accent); }
.toggle.leaf { border-color: transparent; color: var(--muted); cursor: default; }

.sign-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-right: 5px; }

.node-label {
    flex: 1; min-width: 0; font-size: 11.5px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 34px; letter-spacing: 0.01em;
}
.node-label.root-lbl { color: var(--accent); font-weight: 700; }

.node-input {
    flex: 1; min-width: 0; background: rgba(0,0,0,0.35); border: none;
    border-bottom: 1px solid var(--accent2); color: var(--text);
    font-family: var(--mono); font-size: 11.5px; padding: 0 2px;
    outline: none; letter-spacing: 0.01em; height: 26px;
}

.row-actions {
    display: flex; gap: 0; flex-shrink: 0;
    position: absolute; right: 0; top: 0; bottom: 0;
    align-items: center;
    background: linear-gradient(to right, transparent 0%, var(--panel) 22%);
    padding-left: 18px;
    opacity: 0; transition: opacity 0.1s; pointer-events: none;
}
.tree-row:hover .row-actions,
.tree-row.selected .row-actions { opacity: 1; pointer-events: all; }

@media (hover: none) {
    .row-actions { opacity: 1; pointer-events: all; }
}

.row-btn {
    background: none; border: none; color: var(--muted); font-size: 12px;
    width: 24px; height: 34px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: color 0.1s, background 0.1s;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.row-btn:hover,
.row-btn:active { color: var(--accent); background: rgba(212,168,76,0.1); }
.row-btn.del:hover,
.row-btn.del:active { color: #d07070; background: rgba(208,112,112,0.1); }

.row-btn.reorder { font-size: 11px; color: var(--dim); }
.row-btn.reorder:hover,
.row-btn.reorder:active { color: var(--accent); background: rgba(212,168,76,0.1); }
.row-btn.reorder.disabled { opacity: 0; pointer-events: none; }

.legend {
    flex-shrink: 0; padding: 7px 14px;
    border-top: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 4px 11px;
    max-height: 80px; overflow-y: auto;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }

.panel-foot {
    flex-shrink: 0; padding: 8px 14px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
}
.status { flex: 1; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }

.btn-export {
    background: none; border: 1px solid var(--accent2); color: var(--accent);
    font-family: var(--head); font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 6px 14px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s; white-space: nowrap;
    touch-action: manipulation;
}
.btn-export:hover { border-color: var(--accent); background: rgba(212,168,76,0.07); }

.btn-save {
    flex-shrink: 0; background: none; border: 1px solid var(--accent2);
    color: var(--accent); font-family: var(--head); font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 4px 14px; cursor: pointer; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
    touch-action: manipulation;
}
.btn-save:hover { background: rgba(212,168,76,0.1); border-color: var(--accent); }
.btn-save.saved { color: var(--muted); border-color: var(--border2); pointer-events: none; }

.save-indicator {
    font-size: 11px; color: var(--accent); letter-spacing: 0.05em;
    white-space: nowrap; opacity: 0; transition: opacity 0.3s;
}
.save-indicator.visible { opacity: 1; }

.import-section {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
}

.import-toggle {
    width: 100%; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; color: var(--muted); font-family: var(--mono);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    transition: color 0.1s; text-align: left; touch-action: manipulation;
}
.import-toggle:hover { color: var(--text); }

.import-toggle-arrow {
    font-size: 8px; transition: transform 0.18s ease; display: inline-block;
}
.import-toggle-arrow.open { transform: rotate(90deg); }

.import-body {
    display: none; flex-direction: column;
    padding: 0 14px 12px; gap: 8px;
}
.import-body.open { display: flex; }

.import-textarea {
    width: 100%; height: 140px; resize: none;
    background: rgba(0,0,0,0.3); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--mono); font-size: 11px;
    line-height: 1.7; padding: 8px 10px; outline: none;
    letter-spacing: 0.01em; tab-size: 2; caret-color: var(--accent);
    transition: border-color 0.15s;
}
.import-textarea:focus { border-color: var(--accent2); }
.import-textarea::placeholder { color: var(--dim); }

.import-foot { display: flex; align-items: center; gap: 10px; }

.import-status { flex: 1; font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
.import-status.ok  { color: var(--accent); }
.import-status.err { color: #d07070; }

.btn-import {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    font-family: var(--head); font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 5px 12px; cursor: pointer; white-space: nowrap;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    touch-action: manipulation;
}
.btn-import:not(:disabled):hover {
    color: var(--accent); border-color: var(--accent2);
    background: rgba(212,168,76,0.07);
}
.btn-import:disabled { opacity: 0.35; cursor: default; }

.preview { flex: 1; background: #eef3fb; position: relative; overflow: hidden; min-width: 0; }
iframe { width: 100%; height: 100%; border: none; display: block; }

.preview-tag {
    position: absolute; top: 10px; right: 14px;
    font-family: var(--head); font-size: 9px; letter-spacing: 0.2em;
    color: rgba(0,0,0,0.18); text-transform: uppercase; pointer-events: none;
}

.kb-bar {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; pointer-events: none; white-space: nowrap;
}
.kb {
    font-family: var(--mono); font-size: 10px; color: rgba(0,0,0,0.28);
    background: rgba(255,255,255,0.55); padding: 3px 7px; border-radius: 3px;
}

@media screen and (max-width: 1024px), screen and (max-width: 1280px) and (pointer: coarse) {

    :root { --panel-w: 100vw; }

    /* Larger touch targets and readable text for tablet/mobile */
    html, body { font-size: 16px; }
    .header { height: 56px; padding: 0 18px; }
    .btn-toggle-panel { width: 40px; height: 36px; font-size: 20px; }
    .panel-head .panel-head-btn, .btn-save, .btn-export, .btn-import {
        padding: 8px 12px; font-size: 14px; min-height: 40px;
    }
    .import-toggle {
        padding: 10px 16px; font-size: 13px; min-height: 44px;
    }
    .import-toggle-arrow { font-size: 10px; }
    .row-btn { width: 46px; height: 46px; font-size: 14px; }
    .row-btn.reorder { width: 52px; }
    .row-actions { gap: 6px; padding-left: 22px; }
    .tree-row { padding-right: 10px; }
    .node-label { font-size: 15px; line-height: 40px; }
    .node-input { font-size: 15px; height: 36px; padding: 4px 6px; }
    .toggle { width: 22px; height: 22px; font-size: 12px; margin-right: 8px; }
    .sign-dot { width: 10px; height: 10px; margin-right: 8px; }
    .legend-item { font-size: 12px; }
    .import-textarea { font-size: 14px; line-height: 1.6; }
    .kb { font-size: 12px; padding: 6px 8px; }
    .panel { touch-action: manipulation; }

    .body {
        flex-direction: column;
    }

    .panel {
        width: 100% !important;
        height: calc(100dvh - 46px);
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;

        border-right: none;
        border-bottom: 1px solid var(--border);

        transition: height 0.22s ease, opacity 0.22s ease;
    }

    .panel.collapsed {
        width: 100% !important;
        height: 0 !important;
        opacity: 0;
        border-bottom: none;
    }

    .tree-scroll {
        flex: 1 1 auto;
        min-height: 0;
    }

    .preview {
        min-height: 0;
    }

    .kb-bar {
        display: none;
    }

    .header-hint {
        display: none;
    }
}

</style>
</head>
<body>

<div class="shell">

    <header class="header">
        <button class="btn-toggle-panel" id="btnToggle" title="Toggle editor">☰</button>
        <h1>Cult Chart Editor</h1>
        <span class="header-sep"></span>
        <span class="save-indicator" id="saveIndicator"></span>
        <button class="btn-save" id="btnSave">Save</button>
        <span class="header-hint">Click to select · dbl-click to rename · Tab = child · Enter = sibling</span>
    </header>

    <div class="body">

        <div class="panel" id="panel">
            <div class="panel-head">
                <span class="panel-head-title">Members</span>
                <button class="panel-head-btn" id="btnExp">Expand</button>
                <button class="panel-head-btn" id="btnCol">Collapse</button>
            </div>
            <div class="tree-scroll" id="treeRoot"></div>
            <div class="legend" id="legend"></div>
            <div class="panel-foot">
                <span class="status" id="status"></span>
                <button class="btn-export" id="btnCopy">Copy array</button>
            </div>
            <div class="import-section" id="importSection">
                <button class="import-toggle" id="importToggle">
                    <span class="import-toggle-arrow" id="importArrow">▶</span>
                    <span>Paste import</span>
                </button>
                <div class="import-body" id="importBody">
                    <textarea
                        id="importInput"
                        class="import-textarea"
                        spellcheck="false"
                        placeholder="Founding Father&#10;  Starbender Aerion&#10;    Starbender Calliothene&#10;  Veilcross Hadrien&#10;    Veilcross Ilm"
                    ></textarea>
                    <div class="import-foot">
                        <span class="import-status" id="importStatus">—</span>
                        <button class="btn-import" id="btnImport" disabled>Replace tree</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="preview">
            <iframe id="preview" title="Chart Preview"></iframe>
            <div class="preview-tag">Live Preview</div>
            <div class="kb-bar">
                <span class="kb">Enter — sibling</span>
                <span class="kb">Tab — child</span>
                <span class="kb">F2 — rename</span>
                <span class="kb">↑↓ — navigate</span>
                <span class="kb">Del — delete</span>
            </div>
        </div>

    </div>
</div>

<script>
/* ── Data model ── */
let uid = 1;
function mk(name) { return { id: uid++, name, children: [], collapsed: false }; }

function fromPairs(pairs) {
    const map = {}, childSet = new Set();
    for (const [p, c] of pairs) {
        if (!map[p]) map[p] = mk(p);
        if (!map[c]) map[c] = mk(c);
        map[p].children.push(map[c]);
        childSet.add(c);
    }
    const rootName = Object.keys(map).find(n => !childSet.has(n));
    return map[rootName];
}

function toRelationships(node, out = []) {
    for (const c of node.children) { out.push([node.name, c.name]); toRelationships(c, out); }
    return out;
}

/* ── Sign → color ── */
const SIGNS = {
    Founding:'#6c757d', Starbender:'#3b82f6', Veilcross:'#8b5cf6',
    Hollowmark:'#9ca3af', Greythorne:'#14b8a6', Ashenfold:'#a855f7',
    Duskhollow:'#64748b', Thornveil:'#22c55e', Wychstone:'#ef4444',
    Sablerune:'#f97316', Marrowfen:'#a16207', Emberlace:'#fb923c', Pyrelace:'#f87171',
};
const AUTO_PAL = [
    '#06b6d4','#ec4899','#84cc16','#f59e0b',
    '#6366f1','#10b981','#f43f5e','#0ea5e9',
    '#d946ef','#16a34a','#dc2626','#7c3aed',
];
const autoMap = {}; let autoIdx = 0;

function signOf(name) {
    if (name === 'Founding Father') return 'Founding';
    return name.split(' ')[0];
}

function color(name) {
    const s = signOf(name);
    if (SIGNS[s]) return SIGNS[s];
    if (!autoMap[s]) autoMap[s] = AUTO_PAL[autoIdx++ % AUTO_PAL.length];
    return autoMap[s];
}

function allColorMap() {
    const map = { ...SIGNS };
    Object.assign(map, autoMap);
    return map;
}

/* ── Seed data ── */
const SEED = [
    ["Founding Father","Starbender Aerion"],["Founding Father","Veilcross Hadrien"],["Founding Father","Hollowmark Ennis"],
    ["Starbender Aerion","Starbender Calliothene"],["Starbender Aerion","Starbender Tarn"],
    ["Veilcross Hadrien","Veilcross Ilm"],["Veilcross Hadrien","Veilcross Joren"],
    ["Starbender Calliothene","Greythorne Sael"],["Starbender Calliothene","Greythorne Eirevann"],["Starbender Calliothene","Greythorne Talin"],
    ["Starbender Tarn","Starbender Korin"],["Starbender Tarn","Starbender Duvaine"],["Starbender Tarn","Starbender Oren"],
    ["Veilcross Ilm","Veilcross Pell"],["Veilcross Ilm","Veilcross Oranthas"],
    ["Veilcross Joren","Veilcross Sora"],
    ["Greythorne Sael","Greythorne Una"],["Greythorne Sael","Greythorne Veor"],["Greythorne Sael","Greythorne Velindra"],
    ["Greythorne Eirevann","Ashenfold Thrennovael"],
    ["Starbender Korin","Starbender Zev"],["Starbender Korin","Starbender Orvanthis"],
    ["Starbender Duvaine","Duskhollow Caleo"],["Starbender Oren","Starbender Isolvar"],
    ["Veilcross Pell","Veilcross Emrethis"],["Veilcross Pell","Veilcross Faro"],
    ["Veilcross Oranthas","Thornveil Gend"],["Veilcross Oranthas","Thornveil Hesper"],["Veilcross Oranthas","Thornveil Iro"],
    ["Veilcross Sora","Veilcross Aemorrhis"],["Veilcross Sora","Veilcross Jorah"],
    ["Greythorne Talin","Greythorne Lir"],["Greythorne Una","Greythorne Mei"],["Greythorne Velindra","Wychstone Noor"],
    ["Ashenfold Thrennovael","Sablerune Oris"],["Ashenfold Thrennovael","Sablerune Renn"],
    ["Starbender Zev","Starbender Quill"],
    ["Starbender Orvanthis","Marrowfen Rann"],["Starbender Orvanthis","Marrowfen Saris"],
    ["Duskhollow Caleo","Duskhollow Ula"],
    ["Veilcross Emrethis","Emberlace Vren"],["Veilcross Emrethis","Emberlace Wyl"],
    ["Thornveil Iro","Thornveil Xeph"],
    ["Veilcross Aemorrhis","Pyrelace Yorrin"],["Veilcross Aemorrhis","Pyrelace Zera"],
    ["Marrowfen Saris","Marrowfen Sera"],
];

let root = fromPairs(SEED);
let sel = null;
let editing = null;

/* ── Tree helpers ── */
function find(id, n = root) {
    if (n.id === id) return n;
    for (const c of n.children) { const r = find(id, c); if (r) return r; }
    return null;
}
function findParent(id, n = root, p = null) {
    if (n.id === id) return p;
    for (const c of n.children) { const r = findParent(id, c, n); if (r !== undefined) return r; }
    return undefined;
}
function flatVisible(n = root, out = []) {
    out.push(n);
    if (!n.collapsed) for (const c of n.children) flatVisible(c, out);
    return out;
}
function countAll(n) { let t = 1; for (const c of n.children) t += countAll(c); return t; }

/* ── Render ── */
const treeEl  = document.getElementById('treeRoot');
const statusEl = document.getElementById('status');
const legendEl = document.getElementById('legend');

function render() {
    treeEl.innerHTML = '';
    renderNode(root, [], true);
    renderLegend();
    statusEl.textContent = `${countAll(root) - 1} members · ${toRelationships(root).length} relationships`;
}

function renderNode(node, parentBits, isLast) {
    const row = document.createElement('div');
    row.className = 'tree-row' + (node.id === sel ? ' selected' : '');
    row.dataset.id = node.id;

    const depth = parentBits.length;

    if (depth === 0) {
        const sp = document.createElement('div');
        sp.style.cssText = 'flex-shrink:0;width:8px;';
        row.appendChild(sp);
    } else {
        for (let i = 0; i < depth - 1; i++) {
            const vl = document.createElement('div');
            vl.className = 'vline' + (parentBits[i] ? ' continues' : '');
            row.appendChild(vl);
        }
        const conn = document.createElement('div');
        conn.className = 'connector' + (isLast ? '' : ' not-last');
        row.appendChild(conn);
    }

    const tog = document.createElement('div');
    tog.className = 'toggle' + (node.children.length === 0 ? ' leaf' : '');
    tog.textContent = node.children.length === 0 ? '·' : (node.collapsed ? '+' : '−');
    tog.addEventListener('click', e => {
        e.stopPropagation();
        if (node.children.length) { node.collapsed = !node.collapsed; render(); }
    });
    row.appendChild(tog);

    const dot = document.createElement('div');
    dot.className = 'sign-dot';
    dot.style.background = color(node.name);
    row.appendChild(dot);

    const lbl = document.createElement('div');
    lbl.className = 'node-label' + (depth === 0 ? ' root-lbl' : '');
    lbl.textContent = node.name;
    row.appendChild(lbl);

    const acts = document.createElement('div');
    acts.className = 'row-actions';

    if (depth > 0) {
        const parent = findParent(node.id);
        const idx = parent ? parent.children.findIndex(c => c.id === node.id) : -1;
        const isFirst = idx === 0;
        const isLastSib = parent ? idx === parent.children.length - 1 : true;

        const bUp = mkBtn('▲', 'Move up', () => moveSibling(node.id, -1));
        bUp.classList.add('reorder');
        if (isFirst) bUp.classList.add('disabled');
        acts.appendChild(bUp);

        const bDn = mkBtn('▼', 'Move down', () => moveSibling(node.id, 1));
        bDn.classList.add('reorder');
        if (isLastSib) bDn.classList.add('disabled');
        acts.appendChild(bDn);
    }

    if (depth > 0) acts.appendChild(mkBtn('↔', 'Add sibling', () => addSibling(node.id)));
    acts.appendChild(mkBtn('+', 'Add child (Tab)', () => addChild(node.id)));
    acts.appendChild(mkBtn('✎', 'Rename (F2)', () => startRename(node.id)));
    if (depth > 0) {
        const bd = mkBtn('×', 'Delete', () => deleteNode(node.id));
        bd.classList.add('del');
        acts.appendChild(bd);
    }

    row.appendChild(acts);

    row.addEventListener('click', () => { sel = node.id; render(); });
    row.addEventListener('dblclick', e => { e.stopPropagation(); startRename(node.id); });
    treeEl.appendChild(row);

    if (!node.collapsed) {
        for (let i = 0; i < node.children.length; i++) {
            const last = i === node.children.length - 1;
            renderNode(node.children[i], [...parentBits, !last], last);
        }
    }
}

function mkBtn(text, title, onClick) {
    const b = document.createElement('button');
    b.className = 'row-btn';
    b.textContent = text; b.title = title;
    b.addEventListener('click', e => { e.stopPropagation(); onClick(); });
    return b;
}

function renderLegend() {
    legendEl.innerHTML = '';
    const seen = new Set();
    function collect(n) {
        const s = signOf(n.name);
        if (!seen.has(s)) {
            seen.add(s);
            const item = document.createElement('div');
            item.className = 'legend-item';
            const d = document.createElement('div');
            d.className = 'legend-dot';
            d.style.background = color(n.name);
            const lbl = document.createElement('span');
            lbl.textContent = s;
            item.appendChild(d); item.appendChild(lbl);
            legendEl.appendChild(item);
        }
        for (const c of n.children) collect(c);
    }
    collect(root);
}

/* ── Mutations ── */
function addChild(pid) {
    const p = find(pid);
    const c = mk('New Member');
    p.children.push(c); p.collapsed = false;
    sel = c.id; render(); scheduleUpdate();
    requestAnimationFrame(() => startRename(c.id));
}

function addSibling(id) {
    const p = findParent(id); if (!p) return;
    const idx = p.children.findIndex(c => c.id === id);
    const s = mk('New Member');
    p.children.splice(idx + 1, 0, s);
    sel = s.id; render(); scheduleUpdate();
    requestAnimationFrame(() => startRename(s.id));
}

function deleteNode(id) {
    const p = findParent(id); if (!p) return;
    p.children = p.children.filter(c => c.id !== id);
    sel = p.id; render(); scheduleUpdate();
}

function moveSibling(id, dir) {
    const p = findParent(id); if (!p) return;
    const idx = p.children.findIndex(c => c.id === id);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= p.children.length) return;
    const tmp = p.children[idx];
    p.children[idx] = p.children[newIdx];
    p.children[newIdx] = tmp;
    sel = id; render(); scheduleUpdate();
    requestAnimationFrame(() => {
        treeEl.querySelector(`[data-id="${id}"]`)?.scrollIntoView({ block: 'nearest' });
    });
}

/* ── Rename ── */
function startRename(id) {
    editing = id; sel = id;
    const row = treeEl.querySelector(`[data-id="${id}"]`); if (!row) return;
    const lbl = row.querySelector('.node-label');
    const node = find(id);
    const inp = document.createElement('input');
    inp.className = 'node-input'; inp.value = node.name; inp.spellcheck = false;
    lbl.replaceWith(inp); inp.focus(); inp.select();
    function commit() {
        const v = inp.value.trim();
        if (v) node.name = v;
        editing = null; render(); scheduleUpdate();
    }
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); commit(); }
        if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); editing = null; render(); }
    });
}

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', e => {
    if (editing !== null) return;
    if (!sel) return;
    if (e.key === 'Tab') { e.preventDefault(); addChild(sel); }
    else if (e.key === 'Enter') { e.preventDefault(); const p = findParent(sel); if (p) addSibling(sel); else addChild(sel); }
    else if (e.key === 'F2') { e.preventDefault(); startRename(sel); }
    else if (e.key === ' ') {
        e.preventDefault();
        const node = find(sel);
        if (node.children.length > 0) { node.collapsed = !node.collapsed; render(); }
    }
    else if (e.key === 'Delete') {
        const parent = findParent(sel);
        if (parent) { e.preventDefault(); deleteNode(sel); }
    }
    else if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && e.shiftKey) {
        e.preventDefault();
        const parent = findParent(sel);
        if (parent) moveSibling(sel, e.key === 'ArrowUp' ? -1 : 1);
    }
    else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        const flat = flatVisible();
        const i = flat.findIndex(n => n.id === sel);
        const next = flat[i + (e.key === 'ArrowDown' ? 1 : -1)];
        if (next) {
            sel = next.id; render();
            requestAnimationFrame(() => treeEl.querySelector(`[data-id="${sel}"]`)?.scrollIntoView({ block: 'nearest' }));
        }
    }
});

/* ────────────────────────────────────────────────
   UNIFIED POINTER-EVENT GESTURE SYSTEM
   Handles mouse, touch, and stylus with one code path.
   No mixed pointer+touch listeners — prevents double-firing on mobile.

   Pan   : 1 active pointer — drag to pan, release with velocity → momentum
   Pinch : 2 active pointers — pinch to zoom, anchored to midpoint at gesture START
   Wheel : mouse wheel / trackpad scroll → zoom toward cursor
   ──────────────────────────────────────────────── */

/* ════════════════════════════════════════════════
   GESTURE SYSTEM  —  pointer events only
   Pan   : 1 pointer drag  →  release  →  momentum
   Pinch : 2 pointer pinch+pan, anchored at gesture start
   Wheel : zoom toward cursor (mouse + trackpad separate paths)
   ════════════════════════════════════════════════ */

/* Active pointer registry  id → {x, y} */
const ptrs = new Map();

/* ── Momentum ── */
let vx=0, vy=0, rafId=null;
const FRICTION=0.84;   /* decay per frame — lower = stops sooner          */
const VEL_MIN=0.35;    /* below this speed, kill momentum                  */
const VEL_MAX=18;      /* hard cap on launch speed (px/frame at 60 fps)    */

function momentumTick(){
  vx*=FRICTION; vy*=FRICTION;
  if(Math.abs(vx)<VEL_MIN&&Math.abs(vy)<VEL_MIN){rafId=null;sendCam();return;}
  cam.x+=vx; cam.y+=vy; applyTransform();
  rafId=requestAnimationFrame(momentumTick);
}
function stopMomentum(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
function launchMomentum(){
  const spd=Math.hypot(vx,vy);
  if(spd>VEL_MAX){vx=vx/spd*VEL_MAX;vy=vy/spd*VEL_MAX;}
  if(Math.abs(vx)>VEL_MIN||Math.abs(vy)>VEL_MIN) rafId=requestAnimationFrame(momentumTick);
  else{vx=0;vy=0;}
}

/* ── Velocity: ring buffer of recent per-frame deltas ──
   We store the last N frame-deltas and average them.
   This is much more stable than EMA when the pointer
   slows/stops before release — the buffer naturally
   zeros out, preventing phantom momentum. */
const VEL_BUF=6;
const vBufX=new Float32Array(VEL_BUF), vBufY=new Float32Array(VEL_BUF);
let vBufIdx=0;
function resetVelBuf(){vBufX.fill(0);vBufY.fill(0);vBufIdx=0;}
function pushVelSample(dx,dy){
  vBufX[vBufIdx%VEL_BUF]=dx;
  vBufY[vBufIdx%VEL_BUF]=dy;
  vBufIdx++;
}
function readVel(){
  /* Weighted average: newer samples count more.
     Weight = index+1, oldest=1, newest=VEL_BUF */
  let sx=0,sy=0,sw=0;
  const n=Math.min(vBufIdx,VEL_BUF);
  for(let i=0;i<n;i++){
    /* slot order relative to write head */
    const slot=(vBufIdx-n+i)%VEL_BUF;
    const w=i+1;
    sx+=vBufX[slot]*w; sy+=vBufY[slot]*w; sw+=w;
  }
  return sw>0?{x:sx/sw,y:sy/sw}:{x:0,y:0};
}

/* ── Pan state — snapshot at drag start, updated each move ── */
let panAnchorX=0, panAnchorY=0, camAnchorX=0, camAnchorY=0;
let lastPanX=0, lastPanY=0; /* previous pointer position, for per-frame delta */

function snapshotPan(){
  const [p]=[...ptrs.values()];
  panAnchorX=lastPanX=p.x;
  panAnchorY=lastPanY=p.y;
  camAnchorX=cam.x; camAnchorY=cam.y;
  resetVelBuf();
}

/* ── Pinch state — snapshot ONCE when 2nd pointer lands ── */
let pinchActive=false;
let pinch0d=0, pinch0z=0, pinch0mx=0, pinch0my=0, pinchCam0x=0, pinchCam0y=0;
const PINCH_DAMPEN=0.65;

function getPinchMid(){
  const [a,b]=[...ptrs.values()];
  return{mx:(a.x+b.x)/2, my:(a.y+b.y)/2, d:Math.hypot(a.x-b.x,a.y-b.y)};
}
function snapshotPinch(){
  pinchActive=true;
  const{mx,my,d}=getPinchMid();
  const r=sc.getBoundingClientRect();
  pinch0d=d; pinch0z=cam.z;
  pinch0mx=mx-r.left; pinch0my=my-r.top;
  pinchCam0x=cam.x; pinchCam0y=cam.y;
}

/* ── Pointer handlers ── */
sc.addEventListener("pointerdown",e=>{
  if(e.pointerType==="mouse"&&e.button!==0) return;
  stopMomentum();
  sc.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});

  if(ptrs.size===1){
    pinchActive=false;
    snapshotPan();
    sc.classList.add("dragging");
  } else if(ptrs.size===2){
    snapshotPinch();
  }
});

sc.addEventListener("pointermove",e=>{
  if(!ptrs.has(e.pointerId)) return;
  const prev=ptrs.get(e.pointerId);
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});

  if(ptrs.size===1&&!pinchActive){
    /* ── Pan: position from anchor for accuracy; delta from last frame for velocity ── */
    const p=ptrs.get(e.pointerId);
    const fdx=p.x-lastPanX, fdy=p.y-lastPanY; /* true frame-to-frame delta */
    pushVelSample(fdx,fdy);
    lastPanX=p.x; lastPanY=p.y;
    cam.x=camAnchorX+(p.x-panAnchorX);
    cam.y=camAnchorY+(p.y-panAnchorY);
    applyTransform();

  } else if(ptrs.size>=2&&pinchActive){
    /* ── Pinch + pan ── */
    const{mx,my,d}=getPinchMid();
    const r=sc.getBoundingClientRect();
    const curMx=mx-r.left, curMy=my-r.top;
    const ratio=1+(d/pinch0d-1)*PINCH_DAMPEN;
    const nz=Math.min(C.maxZ,Math.max(C.minZ,pinch0z*ratio));
    /* World point anchored to initial pinch centre — no per-frame drift */
    const wx=(pinch0mx-pinchCam0x)/pinch0z;
    const wy=(pinch0my-pinchCam0y)/pinch0z;
    cam.z=nz;
    cam.x=pinch0mx-wx*nz+(curMx-pinch0mx);
    cam.y=pinch0my-wy*nz+(curMy-pinch0my);
    applyTransform();
  }
});

sc.addEventListener("pointerup",e=>endPointer(e));
sc.addEventListener("pointercancel",e=>endPointer(e));

function endPointer(e){
  if(!ptrs.has(e.pointerId)) return;
  ptrs.delete(e.pointerId);

  if(ptrs.size===0){
    sc.classList.remove("dragging");
    pinchActive=false;
    const vel=readVel();
    vx=vel.x; vy=vel.y;
    launchMomentum();
    resetVelBuf();
  } else if(ptrs.size===1){
    /* Finger lifted out of pinch — restart pan from current state */
    pinchActive=false;
    resetVelBuf();
    snapshotPan();
  }
}

/* ── Mouse wheel zoom ──
   Strategy: normalise all deltas into a single "zoom intensity"
   value in [-1, 1] range before computing the zoom factor.
   This prevents the wide variance between mice/OS/browsers.

   Mouse clicks : deltaMode LINE (1) or large PIXEL (≥100)
                  each notch should zoom ~7% — gentle, not jumpy
   Trackpad     : deltaMode PIXEL with small fractional values
                  treat as continuous, tiny steps per event        */
const WHEEL_MOUSE_STEP=0.065; /* fraction to zoom per mouse notch           */
const WHEEL_TP_SCALE=0.003;   /* pixels → zoom exponent for trackpad        */
const WHEEL_TP_MAX=0.12;      /* max zoom per trackpad event (smoothing cap) */

sc.addEventListener("wheel",e=>{
  e.preventDefault();
  stopMomentum();
  const r=sc.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;

  let zf; /* final zoom factor to multiply cam.z by */

  if(e.deltaMode===1){
    /* LINE mode — one notch = 1 line, sign = direction */
    zf = e.deltaY>0 ? 1-WHEEL_MOUSE_STEP : 1+WHEEL_MOUSE_STEP;
  } else {
    /* PIXEL mode — could be mouse (large integer) or trackpad (small/fractional) */
    const abs=Math.abs(e.deltaY);
    const isTrackpad = abs<60 || e.deltaY%1!==0;
    if(isTrackpad){
      /* Continuous trackpad: exponential scaling, capped per-event */
      const t=Math.max(-WHEEL_TP_MAX,Math.min(WHEEL_TP_MAX,-e.deltaY*WHEEL_TP_SCALE));
      zf=Math.exp(t);
    } else {
      /* Mouse in pixel mode — normalise to ±1 notch equivalent regardless of OS delta */
      zf = e.deltaY>0 ? 1-WHEEL_MOUSE_STEP : 1+WHEEL_MOUSE_STEP;
    }
  }

  const oz=cam.z;
  const nz=Math.min(C.maxZ,Math.max(C.minZ,oz*zf));
  const wx=(mx-cam.x)/oz, wy=(my-cam.y)/oz;
  cam.z=nz; cam.x=mx-wx*nz; cam.y=my-wy*nz;
  applyTransform();
},{passive:false});

<\/script></body></html>`;
}

/* ── Save / Load ── */
const SAVE_KEY = 'cult_chart_v1';

function saveToStorage() {
    try {
        const data = { tree: serializeNode(root), autoMap: { ...autoMap }, autoIdx };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        return true;
    } catch (e) { return false; }
}

function loadFromStorage() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        root = deserializeNode(data.tree);
        Object.assign(autoMap, data.autoMap || {});
        autoIdx = data.autoIdx || 0;
        return true;
    } catch (e) { return false; }
}

function serializeNode(n) {
    return { name: n.name, collapsed: n.collapsed, children: n.children.map(serializeNode) };
}

function deserializeNode(d) {
    const n = mk(d.name);
    n.collapsed = d.collapsed || false;
    n.children = (d.children || []).map(deserializeNode);
    return n;
}

/* ── Import from indented text ── */
const importToggle = document.getElementById('importToggle');
const importArrow  = document.getElementById('importArrow');
const importBody   = document.getElementById('importBody');

function parseIndented(text) {
    const lines = text.split('\n');
    const pairs = [];
    const stack = [];
    for (const raw of lines) {
        if (!raw.trim()) continue;
        let indent = 0;
        for (const ch of raw) {
            if (ch === ' ') indent++;
            else if (ch === '\t') indent += 2;
            else break;
        }
        const depth = Math.round(indent / 2);
        const name = raw.trim();
        if (!name) continue;
        while (stack.length > 0 && stack[stack.length - 1].depth >= depth) stack.pop();
        if (stack.length > 0) pairs.push([stack[stack.length - 1].name, name]);
        stack.push({ name, depth });
    }
    return pairs;
}

importInput.addEventListener('input', () => {
    const text = importInput.value.trim();
    if (!text) {
        importStatus.textContent = '—';
        importStatus.className = 'import-status';
        btnImport.disabled = true;
        return;
    }
    const pairs = parseIndented(text);
    const nodeCount = text.split('\n').filter(l => l.trim()).length;
    if (nodeCount < 2 || pairs.length === 0) {
        importStatus.textContent = 'Need at least 2 indented nodes';
        importStatus.className = 'import-status err';
        btnImport.disabled = true;
    } else {
        importStatus.textContent = `${nodeCount} nodes · ${pairs.length} relationships`;
        importStatus.className = 'import-status ok';
        btnImport.disabled = false;
    }
});

btnImport.addEventListener('click', () => {
    const pairs = parseIndented(importInput.value.trim());
    if (!pairs.length) return;
    root = fromPairs(pairs);
    sel = null;
    importInput.value = '';
    importStatus.textContent = '—';
    importStatus.className = 'import-status';
    btnImport.disabled = true;
    importBody.classList.remove('open');
    importArrow.classList.remove('open');
    render();
    scheduleUpdate();
});

/* ── Init ── */
loadFromStorage();
render();
scheduleUpdate();
hasUnsaved = false;
saveIndicator.classList.remove('visible');
btnSave.textContent = 'Save';
</script>
</body>
