<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scalable Organizational Chart</title>

<style>
/* =============================================================================
   GLOBAL / VIEWPORT
============================================================================= */

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;

    background: #eef3fb;

    font-family: Arial, sans-serif;

    user-select: none;
    -webkit-user-select: none;

    /*
        Improves text rendering during transforms.
    */
    text-rendering: geometricPrecision;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/*
    The visible camera viewport.

    IMPORTANT:
    The chart itself never changes layout during zoom.
    We only move/scale the world layer.
*/

#scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;

    cursor: grab;
    touch-action: pinch-zoom;
}

#scene.dragging {
    cursor: grabbing;
}

/* =============================================================================
   WORLD LAYER
============================================================================= */

/*
    This is the ENTIRE chart world.

    We zoom/pan ONLY this layer.

    We do NOT:
        - resize nodes
        - recompute spacing
        - scale text independently

    That keeps geometry stable and prevents overlap bugs.
*/

#world {
    position: absolute;
    left: 0;
    top: 0;

    transform-origin: 0 0;

    will-change: transform;

    /*
        Helps browsers keep text crisp during transforms.
    */
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
}

/* =============================================================================
   SVG EDGE LAYER
============================================================================= */

svg {
    position: absolute;
    inset: 0;

    overflow: visible;
    pointer-events: none;

    z-index: 1;
}

/* =============================================================================
   NODE LAYER
============================================================================= */

#nodesLayer {
    position: absolute;
    left: 0;
    top: 0;

    z-index: 2;
}

/* =============================================================================
   NODE STYLE
============================================================================= */

.node {
    position: absolute;

    width: 190px;
    min-height: 54px;

    padding: 8px 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    text-align: center;

    font-size: 14px;
    font-weight: 700;
    line-height: 1.15;

    color: white;

    border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.28);

    box-shadow: 0 1px 2px rgba(0,0,0,0.08);

    transform: translateX(-50%);

    /*
        Prevents browser subpixel blur accumulation.
    */
    contain: layout style paint;
}

/* =============================================================================
   SIGN COLORS
============================================================================= */

.Founding   { background: #6c757d; }
.Starbender { background: #3b82f6; }
.Veilcross  { background: #8b5cf6; }
.Hollowmark { background: #9ca3af; }
.Greythorne { background: #14b8a6; }
.Ashenfold  { background: #a855f7; }
.Duskhollow { background: #64748b; }
.Thornveil  { background: #22c55e; }
.Wychstone  { background: #ef4444; }
.Sablerune  { background: #f97316; }
.Marrowfen  { background: #a16207; }
.Emberlace  { background: #fb923c; }
.Pyrelace   { background: #f87171; }

</style>
</head>

<body>

<div id="scene">

    <div id="world">

        <svg id="edges"></svg>

        <div id="nodesLayer"></div>

    </div>

</div>

<script>

/* =============================================================================
   IMPORTANT ARCHITECTURE NOTES
===============================================================================

THIS FILE IS DESIGNED FOR HEAVY ITERATION.

You can continuously:
    - add nodes
    - remove nodes
    - reorganize hierarchy
    - expand the chart

WITHOUT changing layout code.

===============================================================================
HOW TO EDIT THE CHART
===============================================================================

ONLY edit the relationships array below.

Every entry is:

    ["Parent Name", "Child Name"]

Example:

    ["Alice", "Bob"]

means:

    Alice
      ↓
      Bob

===============================================================================
WHY THIS APPROACH WORKS
===============================================================================

Earlier failed approaches:
    - manually positioned boxes
    - independently routed edges
    - dynamically searched for paths

That caused:
    - overlapping lines
    - fake relationships
    - broken routing
    - unstable scaling

THIS implementation instead:

    1. Builds a true hierarchy tree
    2. Computes recursive layout
    3. Centers parents over descendants
    4. Draws shared connector buses
    5. Uses a camera transform for zoom/pan

That architecture scales cleanly.

===============================================================================
CRITICAL DESIGN RULE
===============================================================================

THE WORLD NEVER RESCALES ITS INTERNAL LAYOUT.

Zoom only changes the CAMERA.

That means:
    - node spacing remains stable
    - text remains crisp
    - routing remains correct
    - geometry never collapses

===============================================================================
*/


/* =============================================================================
   RELATIONSHIP DATA
============================================================================= */

const relationships = [

["Founding Father","Starbender Aerion"],
["Founding Father","Veilcross Hadrien"],
["Founding Father","Hollowmark Ennis"],

["Starbender Aerion","Starbender Calliothene"],
["Starbender Aerion","Starbender Tarn"],

["Veilcross Hadrien","Veilcross Ilm"],
["Veilcross Hadrien","Veilcross Joren"],

["Starbender Calliothene","Greythorne Sael"],
["Starbender Calliothene","Greythorne Eirevann"],
["Starbender Calliothene","Greythorne Talin"],

["Starbender Tarn","Starbender Korin"],
["Starbender Tarn","Starbender Duvaine"],
["Starbender Tarn","Starbender Oren"],

["Veilcross Ilm","Veilcross Pell"],
["Veilcross Ilm","Veilcross Oranthas"],

["Veilcross Joren","Veilcross Sora"],

["Greythorne Sael","Greythorne Una"],
["Greythorne Sael","Greythorne Veor"],
["Greythorne Sael","Greythorne Velindra"],

["Greythorne Eirevann","Ashenfold Thrennovael"],

["Starbender Korin","Starbender Zev"],
["Starbender Korin","Starbender Orvanthis"],

["Starbender Duvaine","Duskhollow Caleo"],

["Starbender Oren","Starbender Isolvar"],

["Veilcross Pell","Veilcross Emrethis"],
["Veilcross Pell","Veilcross Faro"],

["Veilcross Oranthas","Thornveil Gend"],
["Veilcross Oranthas","Thornveil Hesper"],
["Veilcross Oranthas","Thornveil Iro"],

["Veilcross Sora","Veilcross Aemorrhis"],
["Veilcross Sora","Veilcross Jorah"],

["Greythorne Talin","Greythorne Lir"],

["Greythorne Una","Greythorne Mei"],

["Greythorne Velindra","Wychstone Noor"],

["Ashenfold Thrennovael","Sablerune Oris"],
["Ashenfold Thrennovael","Sablerune Renn"],

["Starbender Zev","Starbender Quill"],

["Starbender Orvanthis","Marrowfen Rann"],
["Starbender Orvanthis","Marrowfen Saris"],

["Duskhollow Caleo","Duskhollow Ula"],

["Veilcross Emrethis","Emberlace Vren"],
["Veilcross Emrethis","Emberlace Wyl"],

["Thornveil Iro","Thornveil Xeph"],

["Veilcross Aemorrhis","Pyrelace Yorrin"],
["Veilcross Aemorrhis","Pyrelace Zera"],

["Marrowfen Saris","Marrowfen Sera"]

];


/* =============================================================================
   CONSTANTS
============================================================================= */

const CONFIG = {

    nodeWidth: 190,
    nodeHeight: 54,

    /*
        More spacing = cleaner chart.

        Increase these safely as the org grows.
    */

    xGap: 280,
    yGap: 180,

    paddingX: 120,
    paddingY: 80,

    busGap: 24,

    minZoom: 0.25,
    maxZoom: 2.5
};


/* =============================================================================
   DOM REFERENCES
============================================================================= */

const scene = document.getElementById("scene");
const world = document.getElementById("world");
const svg = document.getElementById("edges");
const nodesLayer = document.getElementById("nodesLayer");


/* =============================================================================
   TREE BUILDING
============================================================================= */

const children = new Map();
const parentOf = new Map();
const allNodes = new Set();

for (const [parent, child] of relationships) {

    allNodes.add(parent);
    allNodes.add(child);

    parentOf.set(child, parent);

    if (!children.has(parent)) {
        children.set(parent, []);
    }

    children.get(parent).push(child);
}

/*
    Root node = node with no parent.
*/

const root = [...allNodes].find(node => !parentOf.has(node));


/* =============================================================================
   TREE LAYOUT
===============================================================================

Recursive tidy-tree style layout.

RULES:
    - leaves get sequential x slots
    - parents center over descendants

This creates stable readable hierarchy geometry.

============================================================================= */

const positions = new Map();

let leafIndex = 0;

function layout(node, depth) {

    const kids = children.get(node) || [];

    if (kids.length === 0) {

        positions.set(node, {
            x: leafIndex++,
            y: depth
        });

        return;
    }

    const start = leafIndex;

    for (const child of kids) {
        layout(child, depth + 1);
    }

    const end = leafIndex - 1;

    positions.set(node, {
        x: (start + end) / 2,
        y: depth
    });
}

layout(root, 0);


/* =============================================================================
   CHART DIMENSIONS
============================================================================= */

const maxDepth = Math.max(
    ...[...positions.values()].map(p => p.y)
);

const chartWidth =
    CONFIG.paddingX * 2 +
    Math.max(0, (leafIndex - 1) * CONFIG.xGap) +
    CONFIG.nodeWidth;

const chartHeight =
    CONFIG.paddingY * 2 +
    maxDepth * CONFIG.yGap +
    CONFIG.nodeHeight;

world.style.width = chartWidth + "px";
world.style.height = chartHeight + "px";

svg.setAttribute("width", chartWidth);
svg.setAttribute("height", chartHeight);
svg.setAttribute("viewBox", `0 0 ${chartWidth} ${chartHeight}`);


/* =============================================================================
   POSITION HELPERS
============================================================================= */

function xOf(name) {
    return CONFIG.paddingX +
           positions.get(name).x * CONFIG.xGap;
}

function yOf(name) {
    return CONFIG.paddingY +
           positions.get(name).y * CONFIG.yGap;
}


/* =============================================================================
   NODE HELPERS
============================================================================= */

function signClass(name) {

    if (name === "Founding Father") {
        return "Founding";
    }

    return name.split(" ")[0];
}


/* =============================================================================
   RENDER NODES
============================================================================= */

function renderNodes() {

    nodesLayer.innerHTML = "";

    for (const name of allNodes) {

        const node = document.createElement("div");

        node.className =
            `node ${signClass(name)}`;

        node.textContent = name;

        node.style.left = xOf(name) + "px";
        node.style.top = yOf(name) + "px";

        nodesLayer.appendChild(node);
    }
}


/* =============================================================================
   RENDER EDGES
===============================================================================

KEY IDEA:

Each parent gets ONE shared horizontal bus.

BAD:
    parent -> child
    parent -> child
    parent -> child

GOOD:
            Parent
               |
        ----------------
        |      |       |
       C1     C2      C3

This prevents line chaos.

============================================================================= */

function renderEdges() {

    svg.innerHTML = "";

    const grouped = new Map();

    for (const [parent, child] of relationships) {

        if (!grouped.has(parent)) {
            grouped.set(parent, []);
        }

        grouped.get(parent).push(child);
    }

    for (const [parent, kids] of grouped) {

        const px = xOf(parent);

        const pyBottom =
            yOf(parent) + CONFIG.nodeHeight;

        const busY =
            pyBottom + CONFIG.busGap;

        const childXs = kids.map(xOf);

        const minX = Math.min(...childXs);
        const maxX = Math.max(...childXs);

        const g =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "g"
            );

        g.setAttribute("stroke", "rgba(70,70,70,0.9)");
        g.setAttribute("stroke-width", "2");
        g.setAttribute("fill", "none");

        /*
            Parent trunk + shared bus.
        */

        const trunk =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "path"
            );

        if (kids.length > 1) {

            trunk.setAttribute(
                "d",
                `
                M ${px} ${pyBottom}
                V ${busY}
                H ${minX}
                H ${maxX}
                `
            );

        } else {

            trunk.setAttribute(
                "d",
                `
                M ${px} ${pyBottom}
                V ${busY}
                H ${childXs[0]}
                `
            );
        }

        g.appendChild(trunk);

        /*
            Vertical child drops.
        */

        for (const child of kids) {

            const cx = xOf(child);

            const cyTop = yOf(child);

            const drop =
                document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "path"
                );

            drop.setAttribute(
                "d",
                `
                M ${cx} ${busY}
                V ${cyTop}
                `
            );

            g.appendChild(drop);
        }

        svg.appendChild(g);
    }
}


/* =============================================================================
   INITIAL RENDER
============================================================================= */

renderNodes();
renderEdges();


/* =============================================================================
   CAMERA SYSTEM
===============================================================================

The camera:
    - pans
    - zooms

The WORLD never changes internal geometry.

This is the scalable architecture used by:
    - diagram editors
    - CAD software
    - whiteboard tools
    - graph visualization systems

============================================================================= */

const camera = {

    x: 0,
    y: 0,
    zoom: 1
};

function updateCamera() {

    /*
        Integer snapping helps keep text sharper.
    */

    const tx = Math.round(camera.x);
    const ty = Math.round(camera.y);

    world.style.transform =
        `translate3d(${tx}px, ${ty}px, 0)
         scale(${camera.zoom})`;
}


/* =============================================================================
   CENTER INITIAL VIEW
============================================================================= */

function centerView() {

    const sceneRect =
        scene.getBoundingClientRect();

    const rootX = xOf(root);

    camera.zoom = 1;

    camera.x =
        sceneRect.width / 2 -
        rootX * camera.zoom;

    camera.y = 40;

    updateCamera();
}

centerView();


/* =============================================================================
   PANNING
============================================================================= */

let dragging = false;

let dragStartX = 0;
let dragStartY = 0;

let startCamX = 0;
let startCamY = 0;

scene.addEventListener("pointerdown", e => {

    if (e.button !== 0) return;

    dragging = true;

    scene.classList.add("dragging");

    dragStartX = e.clientX;
    dragStartY = e.clientY;

    startCamX = camera.x;
    startCamY = camera.y;

    scene.setPointerCapture(e.pointerId);
});

scene.addEventListener("pointermove", e => {

    if (!dragging) return;

    camera.x =
        startCamX +
        (e.clientX - dragStartX);

    camera.y =
        startCamY +
        (e.clientY - dragStartY);

    updateCamera();
});

function stopDragging() {

    dragging = false;

    scene.classList.remove("dragging");
}

scene.addEventListener("pointerup", stopDragging);
scene.addEventListener("pointercancel", stopDragging);


/* =============================================================================
   STABLE TRACKPAD + MOUSE ZOOM
===============================================================================

This version properly separates:

    1. Mouse wheel scrolling
    2. Trackpad pinch/gesture zooming

Why this works better:

Mouse wheels:
    - large discrete deltas
    - usually integer values
    - should zoom in distinct steps

Trackpads:
    - tiny continuous deltas
    - often fractional
    - should feel smooth and damped

The previous implementation incorrectly treated many modern
mouse wheels as trackpads.

============================================================================= */

scene.addEventListener(
    "wheel",
    e => {

        e.preventDefault();

        const rect =
            scene.getBoundingClientRect();

        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const oldZoom = camera.zoom;

        /*
        ===========================================================================
        INPUT TYPE DETECTION
        ===========================================================================

        Trackpads usually produce:
            - small deltas
            - fractional values
            - high frequency

        Mouse wheels usually produce:
            - larger jumps
            - integer deltas
            - stepwise behavior
        */

        const delta = e.deltaY;

        const hasFractionalDelta =
            delta % 1 !== 0;

        const isTrackpad =
            Math.abs(delta) < 40 ||
            hasFractionalDelta;

        let zoomFactor;

        /*
        ===========================================================================
        TRACKPAD ZOOM
        ===========================================================================

        Smooth continuous scaling.
        */

        if (isTrackpad) {

            const clampedDelta =
                Math.max(-20, Math.min(20, delta));

            const sensitivity = 0.004;

            zoomFactor =
                Math.exp(-clampedDelta * sensitivity);

        }

        /*
        ===========================================================================
        MOUSE WHEEL ZOOM
        ===========================================================================

        Distinct controlled zoom steps.

        Much less sensitive than before.
        */

        else {

            zoomFactor =
                delta > 0
                    ? 1
                    : 1.5;
        }

        const newZoom =
            Math.min(
                CONFIG.maxZoom,
                Math.max(
                    CONFIG.minZoom,
                    oldZoom * zoomFactor
                )
            );

        /*
        ===========================================================================
        CURSOR-ANCHORED ZOOM
        ===========================================================================

        Keeps cursor position stable during zoom.
        */

        const worldX =
            (mx - camera.x) / oldZoom;

        const worldY =
            (my - camera.y) / oldZoom;

        camera.zoom = newZoom;

        camera.x =
            mx - worldX * newZoom;

        camera.y =
            my - worldY * newZoom;

        updateCamera();
    },
    { passive: false }
);

   /* =============================================================================
   TOUCH PAN + PINCH ZOOM
===============================================================================

Simple mobile/tablet controls:

    - One finger  = pan
    - Two fingers = pinch zoom

Uses the SAME camera architecture already used by:
    - mouse drag
    - wheel zoom

So the chart geometry remains perfectly stable.

============================================================================= */

let pinchStartDistance = 0;
let pinchStartZoom = 1;

let pinchWorldX = 0;
let pinchWorldY = 0;

function distanceBetweenTouches(t1, t2) {

    const dx = t2.clientX - t1.clientX;
    const dy = t2.clientY - t1.clientY;

    return Math.hypot(dx, dy);
}

scene.addEventListener(
    "touchstart",
    e => {

        /*
            Prevent browser page zoom/scroll.
        */

        e.preventDefault();

        /*
        ===========================================================================
        SINGLE FINGER PAN
        ===========================================================================

        Reuse existing drag system.
        */

        if (e.touches.length === 1) {

            const touch = e.touches[0];

            dragging = true;

            dragStartX = touch.clientX;
            dragStartY = touch.clientY;

            startCamX = camera.x;
            startCamY = camera.y;
        }

        /*
        ===========================================================================
        TWO FINGER PINCH
        ===========================================================================

        Store:
            - initial pinch distance
            - initial zoom
            - world point under pinch center
        */

        else if (e.touches.length === 2) {

            dragging = false;

            const [t1, t2] = e.touches;

            pinchStartDistance =
                distanceBetweenTouches(t1, t2);

            pinchStartZoom = camera.zoom;

            const rect =
                scene.getBoundingClientRect();

            const centerX =
                (t1.clientX + t2.clientX) / 2 -
                rect.left;

            const centerY =
                (t1.clientY + t2.clientY) / 2 -
                rect.top;

            pinchWorldX =
                (centerX - camera.x) / camera.zoom;

            pinchWorldY =
                (centerY - camera.y) / camera.zoom;
        }
    },
    { passive: false }
);

scene.addEventListener(
    "touchmove",
    e => {

        e.preventDefault();

        /*
        ===========================================================================
        ONE FINGER PAN
        ===========================================================================

        */

        if (e.touches.length === 1 && dragging) {

            const touch = e.touches[0];

            camera.x =
                startCamX +
                (touch.clientX - dragStartX);

            camera.y =
                startCamY +
                (touch.clientY - dragStartY);

            updateCamera();
        }

        /*
        ===========================================================================
        TWO FINGER PINCH ZOOM
        ===========================================================================

        */

        else if (e.touches.length === 2) {

            const [t1, t2] = e.touches;

            const currentDistance =
                distanceBetweenTouches(t1, t2);

            const zoomFactor =
                currentDistance / pinchStartDistance;

            const newZoom =
                Math.min(
                    CONFIG.maxZoom,
                    Math.max(
                        CONFIG.minZoom,
                        pinchStartZoom * zoomFactor
                    )
                );

            const rect =
                scene.getBoundingClientRect();

            const centerX =
                (t1.clientX + t2.clientX) / 2 -
                rect.left;

            const centerY =
                (t1.clientY + t2.clientY) / 2 -
                rect.top;

            camera.zoom = newZoom;

            /*
                Keep pinch center anchored.
            */

            camera.x =
                centerX -
                pinchWorldX * newZoom;

            camera.y =
                centerY -
                pinchWorldY * newZoom;

            updateCamera();
        }
    },
    { passive: false }
);

scene.addEventListener(
    "touchend",
    () => {

        dragging = false;
    },
    { passive: false }
);

scene.addEventListener(
    "touchcancel",
    () => {

        dragging = false;
    },
    { passive: false }
);

</script>

</body>
</html>
